name: CI

on:
  push:
  pull_request:

jobs:
  contract-build:
    name: Build contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v27.0.0

      - name: Restore vendored Soroban host
        run: |
          mkdir -p vendor/soroban-env-host
          curl -A 'GitHub Actions' -fsSL https://crates.io/api/v1/crates/soroban-env-host/26.1.3/download \
            -o /tmp/soroban-env-host.crate
          tar -xzf /tmp/soroban-env-host.crate -C vendor/soroban-env-host --strip-components=1

      - name: Build contract
        run: ./scripts/compile.sh

  frontend-typecheck:
    name: Type check frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npm exec tsc -- --noEmit
